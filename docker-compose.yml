version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: neurosight_postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 17032004
      POSTGRES_DB: neurosight

    ports:
      - "5434:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: